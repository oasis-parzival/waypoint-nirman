<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="tacticalGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a0d1bc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1efe2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <mask id="holeMask">
    <rect width="1000" height="1000" fill="white" />
    <circle cx="520" cy="520" r="90" fill="black" />
  </mask>

  <g mask="url(#holeMask)">
    <!-- Main Needle Body -->
    <path d="M200 980 L445 423 L900 20 L720 525 L505 605 Z" fill="url(#tacticalGrad)" />
    
    <!-- Mountain Ridgeline (Left) -->
    <path d="M15 655 L215 425 L260 540 L213 388 L348 215 L477 348 L415 152 L513 65 L632 258 L580 174 L695 328 Z" fill="url(#tacticalGrad)" />
    
    <!-- Mountain Fin (Right) -->
    <path d="M735 410 L770 515 L885 580 L768 535 Z" fill="url(#tacticalGrad)" />
  </g>
  
  <!-- Subtle Glow Effect -->
  <circle cx="520" cy="520" r="95" stroke="#a0d1bc" stroke-width="5" stroke-opacity="0.2" fill="none" />
</svg>